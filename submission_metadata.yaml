ai_usage_summary: |
  Used AI assistance to inspect the bundle, design the ranking rubric, write code,
  and prepare the explanatory deck. No hosted LLM or network call is used during
  candidate ranking.

methodology_summary: |
  Career-first ranker for the Senior AI Engineer JD. The system extracts evidence
  from profile summaries and career descriptions, prioritizing production search,
  retrieval, ranking, recommender, embeddings, vector infrastructure, and ranking
  evaluation experience. Skills are treated as supporting evidence only. Behavioral
  Redrob signals act as an availability multiplier, while services-only histories,
  keyword stuffing, inactivity, long notice periods, and honeypot-like skill
  contradictions are penalized. The result is a deterministic offline CPU ranker
  that generates a top-100 CSV with candidate-specific reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

